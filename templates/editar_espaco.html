<h1>Editar Espaço</h1>

<form method="POST">
  <label>Nome:</label>
  <input
    type="text"
    name="nome"
    value="{{ espaco.nome }}"
    required
  /><br /><br />

  <label>Descrição:</label>
  <input
    type="text"
    name="descricao"
    value="{{ espaco.descricao }}"
  /><br /><br />

  <label>Preço por hora:</label>
  <input
    type="number"
    name="preco"
    value="{{ espaco.precoHora }}"
    required
  /><br /><br />

  <button type="submit">Guardar Alterações</button>
</form>

<a href="{{ url_for('main.index') }}">Voltar</a>
