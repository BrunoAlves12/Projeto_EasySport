<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Espaço | EasySport</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/base.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/admin.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/espacos.css') }}"
    />
  </head>

  <body class="admin-page spaces-page">
    <div class="admin-shell">
      <header class="admin-header">
        <a class="admin-brand" href="{{ url_for('main.admin_dashboard') }}">
          <img
            class="admin-brand__logo"
            src="{{ url_for('static', filename='img/easysport-logo.png') }}"
            alt="Logo EasySport"
          />
          <div>
            <p class="admin-brand__eyebrow">Gestão de espaços</p>
            <h1>EasySport</h1>
          </div>
        </a>

        <div class="spaces-header__actions">
          <a class="spaces-button spaces-button--secondary" href="{{ url_for('espaco.listar_espacos') }}">
            Voltar à listagem
          </a>
        </div>
      </header>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="admin-messages">
            {% for message in messages %}
              <p class="admin-alert">{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <section class="spaces-form-section">
        <article class="spaces-form-card">
          <div class="admin-section__header">
            <p class="admin-section__eyebrow">Editar espaço</p>
            <h3>{{ espaco.nome }}</h3>
          </div>

          <form class="spaces-form" method="POST" enctype="multipart/form-data">
            <div class="spaces-form__field">
              <label for="nome">Nome</label>
              <input type="text" id="nome" name="nome" value="{{ espaco.nome }}" required />
            </div>

            <div class="spaces-form__field">
              <label for="modalidade">Modalidade</label>
              <input type="text" id="modalidade" name="modalidade" value="{{ espaco.modalidade or '' }}" required />
            </div>

            <div class="spaces-form__field">
              <label for="descricao">Descrição</label>
              <input type="text" id="descricao" name="descricao" value="{{ espaco.descricao }}" />
            </div>

            <div class="spaces-form__field">
              <label for="preco">Preço por hora</label>
              <input type="number" id="preco" name="preco" value="{{ espaco.precoHora }}" required />
            </div>

            <div class="spaces-form__media">
              <div class="spaces-form__field">
                <label>Imagem atual</label>
                <div class="spaces-current-image">
                  <img
                    src="{{ url_for('static', filename=espaco.imagem_listagem) }}"
                    alt="{{ espaco.nome }}"
                  />
                </div>
              </div>

              <div class="spaces-form__field">
                <label for="imagem">Nova imagem</label>
                <input type="file" id="imagem" name="imagem" accept="image/*" />
                <p class="spaces-form__hint">Se não escolher uma nova imagem, a imagem atual será mantida.</p>
              </div>
            </div>

            <div class="spaces-form__actions">
              <button class="spaces-button spaces-button--primary" type="submit">Guardar alterações</button>
              <a class="spaces-button spaces-button--secondary" href="{{ url_for('espaco.listar_espacos') }}">
                Sair
              </a>
            </div>
          </form>
        </article>
      </section>
    </div>
  </body>
</html>
