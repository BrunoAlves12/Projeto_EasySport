<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registo | EasySport</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card auth-card--wide">
        <div class="auth-brand">
          <img
            class="auth-logo"
            src="{{ url_for('static', filename='img/easysport-logo.png') }}"
            alt="Logo EasySport"
          />
          <p class="auth-eyebrow">Cria a tua conta</p>
          <h1>Registar utilizador</h1>
        <!--<p class="auth-subtitle">
            Preenche os teus dados para começar a reservar espaços de forma simples.
          </p> -->
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="auth-messages">
              {% for message in messages %}
                <p class="auth-alert">{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form class="auth-form" action="/register" method="post">
          <div class="auth-field">
            <label for="nome">Nome</label>
            <input id="nome" type="text" name="nome" placeholder="Nome" required />
          </div>

          <div class="auth-field">
            <label for="username">Username</label>
            <input
              id="username"
              type="text"
              name="username"
              placeholder="Username"
              required
            />
          </div>

          <div class="auth-field">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="Email"
              required
            />
          </div>

          <div class="auth-field">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Password"
              required
            />
          </div>

          <div class="auth-field">
            <label for="dataNascimento">Data de nascimento</label>
            <input
              id="dataNascimento"
              type="date"
              name="dataNascimento"
              required
            />
          </div>

          <div class="auth-actions">
            <button class="auth-button" type="submit">Registar</button>
            <a class="auth-button auth-button--secondary" href="/">Cancelar</a>
          </div>
        </form>

        <div class="auth-links auth-links--center">
          <span>Já tens conta?</span>
          <a href="/login">Fazer login</a>
        </div>
      </section>
    </main>
  </body>
</html>
