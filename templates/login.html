<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | EasySport</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-brand">
          <img
            class="auth-logo"
            src="{{ url_for('static', filename='img/easysport-logo.png') }}"
            alt="Logo EasySport"
          />
          <p class="auth-eyebrow">Plataforma de reservas desportivas</p>
          <h1>Entrar na conta</h1>
         <!-- <p class="auth-subtitle">
            Acede ao teu perfil para gerir reservas e acompanhar a tua atividade.
          </p> -->
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="auth-messages">
              {% for message in messages %}
                <p class="auth-alert">{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form class="auth-form" action="/login" method="post">
          <div class="auth-field">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" placeholder="Username" required />
          </div>

          <div class="auth-field">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Password" required />
          </div>

          <button class="auth-button" type="submit">Login</button>
        </form>

        <div class="auth-links">
          <a href="/">Voltar ao início</a>
          <a href="/register">Criar conta</a>
        </div>
      </section>
    </main>
  </body>
</html>
